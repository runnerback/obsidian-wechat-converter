name: Build and Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Setup Mock for CI
      run: |
        mkdir -p node_modules/obsidian
        cp __mocks__/obsidian.js node_modules/obsidian/index.js

    - name: Fast Obsidian scan-risk guard
      if: github.event_name == 'push' && github.ref_name != 'main' && github.ref_name != 'master'
      run: npm run scan:guard

    - name: Obsidian scan readiness guard
      if: github.event_name == 'pull_request' || github.ref_name == 'main' || github.ref_name == 'master'
      run: npm run review:guard
